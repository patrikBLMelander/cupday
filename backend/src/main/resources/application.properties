spring.application.name=cup-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cup}
spring.datasource.username=${DB_USER:cup}
spring.datasource.password=${DB_PASSWORD:cup}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

server.port=${PORT:8080}
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

cup.auth.jwt.secret=${JWT_SECRET:please-rotate-me-256-bits-is-32-bytes-yes}
cup.auth.jwt.ttl-seconds=${JWT_TTL_SECONDS:86400}
cup.auth.admin.email=${CUP_ADMIN_EMAIL:}
cup.auth.admin.password-hash=${CUP_ADMIN_PASSWORD_HASH:}
