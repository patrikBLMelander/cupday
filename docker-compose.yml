services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cup
      POSTGRES_PASSWORD: cup
      POSTGRES_DB: cup
    ports:
      - "5432:5432"
    volumes:
      - cup-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cup -d cup"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cup
      DB_USER: cup
      DB_PASSWORD: cup
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  cup-postgres:
