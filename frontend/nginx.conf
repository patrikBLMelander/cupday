server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any non-asset path falls back to index.html so React Router
  # handles the client-side routes (e.g. /admin, /c/<slug>, etc.).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Asset caching for fingerprinted bundle files.
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache the entry HTML — it references hashed asset URLs.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
